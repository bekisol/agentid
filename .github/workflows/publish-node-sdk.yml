name: Publish Node SDK to npm

on:
  push:
    tags:
      - 'sdk-node-v*'   # git tag sdk-node-v0.2.1 && git push --tags

jobs:
  publish:
    name: Build and publish @vikhulus/agentid-protocol
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@vikhulus'

      - name: Install dependencies
        run: |
          cd sdk/typescript
          npm install

      - name: Build
        run: |
          cd sdk/typescript
          npm run build

      - name: Publish to npm
        run: |
          cd sdk/typescript
          npm publish --access public --verbose 2>&1 || (echo "EXIT CODE: $?"; exit 1)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
