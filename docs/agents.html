<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentID — Agent Registry</title>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self';
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
             font-src https://fonts.gstatic.com;
             connect-src https://api.agentid-protocol.com https://fonts.googleapis.com https://fonts.gstatic.com;
             img-src 'self' data:;
             frame-ancestors 'none';" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #F9F7F4;
      --surface:      #FFFFFF;
      --surface2:     #F2F0EC;
      --border:       #E5E2DB;
      --border-dark:  #C9C5BC;
      --text:         #1C1917;
      --text-2:       #44403C;
      --muted:        #78716C;
      --accent:       #C2410C;
      --accent-light: #FFF7ED;
      --accent-border:#FDBA74;
      --green:        #059669;
      --green-bg:     #ECFDF5;
      --yellow:       #D97706;
      --yellow-bg:    #FFFBEB;
      --blue:         #2563EB;
      --blue-bg:      #EFF6FF;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", -apple-system, sans-serif;
      line-height: 1.6;
      font-size: 15px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-brand { font-weight: 800; font-size: 1.1rem; color: var(--text); letter-spacing: -0.02em; }
    .topbar-brand span { color: var(--accent); }

    .container { max-width: 900px; margin: 2.5rem auto; padding: 0 1.5rem; }

    .page-header { margin-bottom: 1.75rem; }
    .page-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
    .page-sub { font-size: 0.9rem; color: var(--muted); }

    .toolbar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap input {
      width: 100%;
      padding: 0.5rem 0.75rem 0.5rem 2.1rem;
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      background: var(--surface);
      font-size: 0.875rem;
      color: var(--text);
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      color: var(--muted);
      pointer-events: none;
    }
    .cap-filter {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      background: var(--surface);
      font-size: 0.875rem;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }
    .cap-filter:focus { border-color: var(--accent); }
    .count-label { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }

    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .agent-card:hover {
      border-color: var(--accent-border);
      box-shadow: 0 2px 12px rgba(194,65,12,0.08);
      text-decoration: none;
    }

    .card-top { display: flex; align-items: flex-start; gap: 0.75rem; }
    .card-avatar {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: var(--accent-light);
      border: 1px solid var(--accent-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }
    .card-name { font-size: 0.95rem; font-weight: 700; line-height: 1.3; }
    .card-did  { font-family: "JetBrains Mono", monospace; font-size: 0.68rem; color: var(--muted); margin-top: 0.15rem; }

    .badge-row { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.2rem;
      font-size: 0.68rem; font-weight: 600;
      padding: 0.15rem 0.45rem; border-radius: 4px;
      letter-spacing: 0.02em;
    }
    .badge-verified { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green); }
    .badge-cap      { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); }

    .caps-row { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .cap-pill {
      font-size: 0.7rem; padding: 0.15rem 0.5rem;
      border-radius: 20px;
      background: var(--accent-light); color: var(--accent);
      border: 1px solid var(--accent-border);
      font-weight: 500;
    }

    .card-footer {
      margin-top: auto;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem; }

    .loading-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      height: 150px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .pager {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }
    .pager-btn {
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border-dark);
      border-radius: 7px;
      background: var(--surface);
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--text);
    }
    .pager-btn:disabled { opacity: 0.4; cursor: default; }
    .pager-btn:not(:disabled):hover { background: var(--surface2); }
    .pager-info { font-size: 0.82rem; color: var(--muted); }

    .footer-note {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2.5rem;
      padding-bottom: 2rem;
    }

    @media (max-width: 600px) {
      .topbar { padding: 0 1rem; }
      .container { padding: 0 1rem; margin: 1.5rem auto; }
      .agents-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">Agent<span>ID</span></div>
  <a href="dashboard.html" style="font-size:0.85rem;color:var(--muted);">← Dashboard</a>
</div>

<div class="container">
  <div class="page-header" id="page-header">
    <div class="page-title">Agent Registry</div>
    <div class="page-sub">Publicly registered agents on the AgentID Protocol</div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search by name, DID, or capability…" autocomplete="off" />
    </div>
    <select class="cap-filter" id="cap-filter">
      <option value="">All capabilities</option>
    </select>
    <span class="count-label" id="count-label"></span>
  </div>

  <div id="grid-wrap">
    <div class="loading-grid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>

  <div class="pager" id="pager" style="display:none;">
    <button class="pager-btn" id="prev-btn">← Prev</button>
    <span class="pager-info" id="pager-info"></span>
    <button class="pager-btn" id="next-btn">Next →</button>
  </div>
</div>

<div class="footer-note">
  Powered by <a href="https://agentid-protocol.com">AgentID Protocol</a>
</div>

<script>
const BASE = "https://api.agentid-protocol.com";
const PER_PAGE = 20;

function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function shortDid(did) {
  if (!did) return "—";
  return did.length > 32 ? did.slice(0, 16) + "…" + did.slice(-10) : did;
}

function timeAgo(iso) {
  if (!iso) return null;
  const diff = Date.now() - new Date(iso).getTime();
  const d = Math.floor(diff / 86400000);
  if (d < 1)  return "today";
  if (d === 1) return "yesterday";
  if (d < 30) return `${d}d ago`;
  return new Date(iso).toLocaleDateString("en-US", { month: "short", year: "numeric" });
}

// State
let _agents   = [];
let _filtered = [];
let _page     = 1;
let _verifiedSet = new Set();
let _owner    = null;

function getOwnerFromURL() {
  return new URLSearchParams(location.search).get("owner") || null;
}

async function fetchVerifiedBadges(dids) {
  await Promise.allSettled(dids.map(async did => {
    try {
      const res = await fetch(`${BASE}/pro/badges/${encodeURIComponent(did)}`);
      if (res.ok) {
        const d = await res.json();
        if (d.verified) _verifiedSet.add(did);
      }
    } catch {}
  }));
}

function buildCapFilter() {
  const allCaps = new Set();
  _agents.forEach(a => (a.capabilities || []).forEach(c => allCaps.add(c)));
  const sel = document.getElementById("cap-filter");
  const current = sel.value;
  // Rebuild options (keep "All" at top)
  while (sel.options.length > 1) sel.remove(1);
  [...allCaps].sort().forEach(c => {
    const opt = document.createElement("option");
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
  if (current) sel.value = current;
}

function applyFilters() {
  const q   = (document.getElementById("search-input").value || "").trim().toLowerCase();
  const cap = document.getElementById("cap-filter").value;

  _filtered = _agents.filter(a => {
    const caps = (a.capabilities || []).map(c => c.toLowerCase());
    const matchQ   = !q || a.name.toLowerCase().includes(q)
                       || (a.did || "").toLowerCase().includes(q)
                       || caps.some(c => c.includes(q));
    const matchCap = !cap || caps.includes(cap.toLowerCase());
    return matchQ && matchCap;
  });

  _page = 1;
  renderPage();
}

function renderPage() {
  const total = _filtered.length;
  const pages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (_page > pages) _page = pages;

  const start = (_page - 1) * PER_PAGE;
  const slice = _filtered.slice(start, start + PER_PAGE);

  const label = document.getElementById("count-label");
  label.textContent = total === _agents.length
    ? `${total} agent${total !== 1 ? "s" : ""}`
    : `${total} of ${_agents.length} agents`;

  const wrap = document.getElementById("grid-wrap");
  if (!slice.length) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No agents found</div>
        <p>Try a different search or capability filter.</p>
      </div>`;
  } else {
    wrap.innerHTML = `<div class="agents-grid">${slice.map(renderCard).join("")}</div>`;
  }

  // Pager
  const pager = document.getElementById("pager");
  if (pages > 1) {
    pager.style.display = "flex";
    document.getElementById("pager-info").textContent = `Page ${_page} of ${pages}`;
    document.getElementById("prev-btn").disabled = _page <= 1;
    document.getElementById("next-btn").disabled = _page >= pages;
  } else {
    pager.style.display = "none";
  }
}

function renderCard(a) {
  const caps   = (a.capabilities || []).slice(0, 4);
  const extra  = (a.capabilities || []).length - 4;
  const reg    = a.created_at
    ? new Date(a.created_at).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" })
    : null;
  const isVerified = _verifiedSet.has(a.did);

  const capsHtml = caps.map(c => `<span class="cap-pill">${esc(c)}</span>`).join("")
    + (extra > 0 ? `<span class="cap-pill" style="background:var(--surface2);color:var(--muted);border-color:var(--border-dark);">+${extra} more</span>` : "");

  return `
    <a class="agent-card" href="agent.html?did=${encodeURIComponent(a.did)}">
      <div class="card-top">
        <div class="card-avatar">🤖</div>
        <div style="min-width:0;">
          <div class="card-name">${esc(a.name)}</div>
          <div class="card-did">${esc(shortDid(a.did))}</div>
        </div>
      </div>
      ${isVerified ? `<div class="badge-row"><span class="badge badge-verified">✓ Verified</span></div>` : ""}
      ${caps.length ? `<div class="caps-row">${capsHtml}</div>` : ""}
      <div class="card-footer">
        <span>${reg ? `Registered ${esc(reg)}` : ""}</span>
        <span style="color:var(--accent);font-size:0.78rem;">View →</span>
      </div>
    </a>`;
}

async function init() {
  _owner = getOwnerFromURL();

  // Update header if scoped to an owner
  if (_owner) {
    document.getElementById("page-header").innerHTML = `
      <div class="page-title">Agents</div>
      <div class="page-sub" style="font-family:'JetBrains Mono',monospace;font-size:0.78rem;">${esc(_owner)}</div>`;
    document.title = `AgentID — Agents`;
  }

  // Fetch agents (paginate through all if owner-scoped, up to 500)
  try {
    const url = _owner
      ? `${BASE}/agents?owner=${encodeURIComponent(_owner)}&limit=500`
      : `${BASE}/agents?limit=500`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    _agents = await res.json();
  } catch {
    document.getElementById("grid-wrap").innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Could not load agents</div>
        <p>Please try again later.</p>
      </div>`;
    return;
  }

  if (!_agents.length) {
    document.getElementById("grid-wrap").innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🤖</div>
        <div class="empty-title">No agents registered</div>
        <p>${_owner ? "This account has no public agents yet." : "No agents have been registered yet."}</p>
      </div>`;
    document.getElementById("count-label").textContent = "0 agents";
    return;
  }

  // Render immediately, then fetch badges in background
  _filtered = [..._agents];
  buildCapFilter();
  renderPage();

  // Fetch verified badges in background and re-render
  const dids = _agents.map(a => a.did);
  fetchVerifiedBadges(dids).then(() => {
    if (_verifiedSet.size > 0) renderPage();
  });

  // Wire up filters
  document.getElementById("search-input").addEventListener("input", applyFilters);
  document.getElementById("cap-filter").addEventListener("change", applyFilters);
  document.getElementById("prev-btn").addEventListener("click", () => { _page--; renderPage(); window.scrollTo(0, 0); });
  document.getElementById("next-btn").addEventListener("click", () => { _page++; renderPage(); window.scrollTo(0, 0); });
}

init();
</script>
</body>
</html>
